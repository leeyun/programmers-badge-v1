name: trigger_action

on:
  push:
    branches: ['master']
  repository_dispatch:
    types: [trigger-workflow]
  schedule:
    # 매일 자정(KST 기준 오전 9시)에 자동 실행. 주기는 마음대로 변경 가능해.
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create .env file
        run: |
          touch .env
          echo "GH_PAT=${{ secrets.GH_PAT }}" >> .env
          echo "GH_REPOSITORY=${{ secrets.GH_REPOSITORY }}" >> .env
          echo "PROGRAMMERS_ID=${{ secrets.PROGRAMMERS_ID }}" >> .env
          echo "PROGRAMMERS_PW=${{ secrets.PROGRAMMERS_PW }}" >> .env

      - name: Start application
        # 백그라운드 실행(&)을 빼서 이 단계가 완전히 끝날 때까지 워크플로우가 기다리도록 수정
        run: npm run start
